{% extends "core/base.html" %}
{% load static %}
{% block title %}Glow AU | Log in{% endblock %}
{% block content %}
<main class="auth-page">
  <section class="auth-panel" aria-labelledby="login-title">
    <div class="auth-copy">
      <p class="eyebrow">Welcome back</p>
      <h1 id="login-title">Log in to Glow AU</h1>
      <p>Choose how you want to use Glow AU, then continue with your Google account.</p>
    </div>

    <div class="auth-form login-role-form" aria-label="Choose account type">
      <form action="{% url 'google_login' %}">
        <input type="hidden" name="role" value="client">
        <button class="google-auth-button role-login-button" type="submit" aria-label="Login as client with Google">
          <svg class="google-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.5-.2-2.2H12v4.2h6.5a5.6 5.6 0 0 1-2.4 3.7v3h3.8c2.2-2.1 3.6-5.1 3.6-8.7z"/>
            <path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.8-3a7.1 7.1 0 0 1-10.6-3.7H1.6v3.1A12 12 0 0 0 12 24z"/>
            <path fill="#FBBC05" d="M5.5 14.4a7.2 7.2 0 0 1 0-4.6V6.7H1.6a12 12 0 0 0 0 10.8l3.9-3.1z"/>
            <path fill="#EA4335" d="M12 4.8c1.7 0 3.3.6 4.5 1.8l3.4-3.4A11.4 11.4 0 0 0 12 0 12 12 0 0 0 1.6 6.7l3.9 3.1A7.1 7.1 0 0 1 12 4.8z"/>
          </svg>
          Login as client
        </button>
      </form>

      <form action="{% url 'google_login' %}">
        <input type="hidden" name="role" value="artist">
        <button class="google-auth-button role-login-button role-login-button-artist" type="submit" aria-label="Login as artist with Google">
          <svg class="google-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.5-.2-2.2H12v4.2h6.5a5.6 5.6 0 0 1-2.4 3.7v3h3.8c2.2-2.1 3.6-5.1 3.6-8.7z"/>
            <path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.8-3a7.1 7.1 0 0 1-10.6-3.7H1.6v3.1A12 12 0 0 0 12 24z"/>
            <path fill="#FBBC05" d="M5.5 14.4a7.2 7.2 0 0 1 0-4.6V6.7H1.6a12 12 0 0 0 0 10.8l3.9-3.1z"/>
            <path fill="#EA4335" d="M12 4.8c1.7 0 3.3.6 4.5 1.8l3.4-3.4A11.4 11.4 0 0 0 12 0 12 12 0 0 0 1.6 6.7l3.9 3.1A7.1 7.1 0 0 1 12 4.8z"/>
          </svg>
          Login as artist
        </button>
      </form>
    </div>
  </section>
</main>
{% endblock %}
